<style>
  /* loading splash so we never flash unstyled */
  #boot { position: fixed; inset: 0; display: grid; place-items: center; background: #F7F1E7; z-index: 9999; transition: opacity .3s; }
  #boot.gone { opacity: 0; pointer-events: none; }
</style>

      <rect x="32" y="64" width="36" height="5" rx="2.5" fill="#fff" opacity="0.9"/>
